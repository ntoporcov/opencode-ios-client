name: OpenCodeIOSClient
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0
  fileTypes:
    icon:
      file: true
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: "845JU3PD5V"
targets:
  OpenCodeIOSClient:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenCodeIOSClient
        excludes:
          - OpenCodeMacApp.swift
          - Info.plist
          - Generated-Info.plist
      - path: OpenCodeShared
      - path: AppIcon.icon
        buildPhase: resources
        group: OpenCodeIOSClient
    dependencies:
      - target: OpenCodeChatActivityExtension
        embed: true
    info:
      path: OpenCodeIOSClient/Generated-Info.plist
      properties:
        CFBundleDisplayName: OpenCode
        UIApplicationSupportsIndirectInputEvents: true
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: com.ntoporcov.opencode-client
            CFBundleURLSchemes:
              - opencode
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ntoporcov.opencode-client
        PRODUCT_NAME: OpenCodeIOSClient
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      gatherCoverageData: false
      testTargets:
        - OpenCodeIOSClientTests
        - OpenCodeIOSClientUITests
  OpenCodeChatActivityExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenCodeChatActivityExtension
        excludes:
          - Info.plist
      - path: OpenCodeShared
    info:
      path: OpenCodeChatActivityExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenCode Live
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ntoporcov.opencode-client.liveactivity
        PRODUCT_NAME: OpenCodeChatActivityExtension
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
  OpenCodeMacClient:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OpenCodeIOSClient
        excludes:
          - OpenCodeIOSClientApp.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ntoporcov.opencode-client.macos
        PRODUCT_NAME: OpenCodeMacClient
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: OpenCodeIOSClient/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: OpenCode
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      gatherCoverageData: false
      testTargets:
        - OpenCodeMacClientTests
  OpenCodeIOSClientTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    hostApplication: OpenCodeIOSClient
    sources:
      - path: OpenCodeIOSClientTests
    dependencies:
      - target: OpenCodeIOSClient
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ntoporcov.opencode-client.tests
        CODE_SIGN_STYLE: Automatic
  OpenCodeIOSClientUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenCodeIOSClientUITests
    dependencies:
      - target: OpenCodeIOSClient
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ntoporcov.opencode-client.uitests
        CODE_SIGN_STYLE: Automatic
  OpenCodeMacClientTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OpenCodeMacClientTests
    dependencies:
      - target: OpenCodeMacClient
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ntoporcov.opencode-client.macos.tests
        CODE_SIGN_STYLE: Automatic
